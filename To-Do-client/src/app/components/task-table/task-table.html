<div class="w-full overflow-x-auto bg-white rounded-2xl border border-gray-200 shadow-sm">
  <table class="w-full border-collapse text-left">
    <thead class="bg-gray-50/75 border-b border-gray-200 select-none">
      <tr>
        <th class="w-12 px-6 py-3"></th>
        @for (data of tableHead(); track data) {
          <th class="px-4 py-3">
            <p class="text-xs font-semibold text-gray-500 uppercase tracking-wider">{{ data }}</p>
          </th>
        }
        <th class="w-24 px-6 py-3"></th>
      </tr>
    </thead>

    <tbody class="divide-y divide-gray-100">
      @for (task of tasks(); track task.id; let idx = $index) {
        @let isEditing = editingTaskId() === task.id;

        <tr
          class="group hover:bg-indigo-50/30 transition-colors duration-150 border-l-black border-l-4"
          [style]="{ 'border-left-color': getCategoryColor(task.categoryId) }"
        >
          <td class="pl-3 pr-6 py-4 whitespace-nowrap text-center">
            <div class="flex">
              <button
                [disabled]="isEditing"
                (click)="onToggleStatus(task.id)"
                class="w-5 h-5 rounded-full border border-gray-300 hover:border-green-500 hover:bg-green-50 flex items-center justify-center transition-colors shrink-0 disabled:opacity-30"
                [class.border-green-500.bg-green-50]="task.isCompleted"
              >
                <svg
                  class="w-3 h-3 text-green-600 opacity-0 group-hover:opacity-100 transition-opacity"
                  [class.opacity-100]="task.isCompleted"
                  fill="currentColor"
                  viewBox="0 0 20 20"
                >
                  <path
                    fill-rule="evenodd"
                    d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
                    clip-rule="evenodd"
                  ></path>
                </svg>
              </button>
            </div>
          </td>

          <td class="px-4 py-2 max-w-xs">
            <input
              type="text"
              [value]="isEditing ? editTitle() : task.title"
              (input)="editTitle.set($any($event.target).value)"
              [readonly]="!isEditing"
              (keydown.enter)="saveEdit(task.id)"
              (keydown.escape)="cancelEdit()"
              class="w-full px-2 py-1 text-sm font-medium text-gray-800 rounded-lg bg-white border transition-all truncate read-only:bg-transparent read-only:border-transparent read-only:pointer-events-none group-hover:text-indigo-950 focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100"
              [class]="isEditing ? 'border-indigo-500' : 'border-transparent'"
            />
          </td>

          <td class="px-4 py-2 max-w-sm">
            <input
              type="text"
              [value]="isEditing ? editDescription() : task.description || ''"
              (input)="editDescription.set($any($event.target).value)"
              [readonly]="!isEditing"
              (keydown.enter)="saveEdit(task.id)"
              (keydown.escape)="cancelEdit()"
              [placeholder]="isEditing ? 'Add description...' : '-'"
              class="w-full px-2 py-1 text-sm text-gray-500 rounded-lg bg-white border transition-all truncate read-only:bg-transparent read-only:border-transparent read-only:pointer-events-none focus:outline-none focus:ring-2 focus:ring-indigo-100"
              [class]="isEditing ? 'border-indigo-500' : 'border-transparent'"
            />
          </td>

          <td class="px-4 py-2 whitespace-nowrap">
            <div class="relative inline-block">
              <select
                [value]="isEditing ? editCategoryId() : task.categoryId"
                (change)="editCategoryId.set($any($event.target).value)"
                [disabled]="!isEditing"
                class="inline-flex items-center text-xs font-semibold px-2.5 py-1 rounded-xl border transition-all duration-150 cursor-pointer max-w-37.5 truncate shadow-sm focus:outline-none focus:ring-2 focus:ring-indigo-100 disabled:bg-gray-50 disabled:text-gray-600 disabled:border-gray-100 disabled:pointer-events-none disabled:shadow-none disabled:appearance-none bg-white text-indigo-700 border-indigo-200 hover:bg-indigo-50/50"
                style="text-align-last: center"
              >
                <option [value]="null" [selected]="task.categoryId === null">Uncategorized</option>
                @for (cat of categories(); track cat.id) {
                  <option
                    class="text-left"
                    [value]="cat.id"
                    [selected]="task.categoryId === cat.id"
                  >
                    {{ cat.name }}
                  </option>
                }
              </select>
            </div>
          </td>

          <td class="px-6 py-2 whitespace-nowrap text-right text-sm font-medium">
            <div class="flex items-center justify-end space-x-1">
              @if (isEditing) {
                <button
                  (click)="saveEdit(task.id)"
                  title="Save changes"
                  class="text-green-600 hover:text-green-700 bg-green-50 p-1.5 rounded-xl hover:bg-green-100 transition-colors"
                >
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2.5"
                      d="M5 13l4 4L19 7"
                    ></path>
                  </svg>
                </button>
                <button
                  (click)="cancelEdit()"
                  title="Cancel"
                  class="text-gray-400 hover:text-gray-600 bg-gray-50 p-1.5 rounded-xl hover:bg-gray-100 transition-colors"
                >
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2.5"
                      d="M6 18L18 6M6 6l12 12"
                    ></path>
                  </svg>
                </button>
              } @else {
                <button
                  (click)="startEdit(task)"
                  title="Edit task"
                  class="text-gray-400 hover:text-indigo-600 md:opacity-0 group-hover:opacity-100 p-1.5 rounded-xl hover:bg-indigo-50 transition-all duration-150"
                >
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"
                    ></path>
                  </svg>
                </button>
                <button
                  (click)="onDelete(task.id)"
                  title="Delete task"
                  class="text-gray-400 hover:text-red-500 md:opacity-0 group-hover:opacity-100 p-1.5 rounded-xl hover:bg-red-50 transition-all duration-150"
                >
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path
                      stroke-linecap="round"
                      stroke-linejoin="round"
                      stroke-width="2"
                      d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-16v1a3 3 0 003 3h10a3 3 0 003-3V3a3 3 0 00-3-3H9a3 3 0 00-3 3v1m5 4h6"
                    ></path>
                  </svg>
                </button>
              }
            </div>
          </td>
        </tr>
      }
    </tbody>
  </table>
</div>
