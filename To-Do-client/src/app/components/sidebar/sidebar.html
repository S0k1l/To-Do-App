<aside class="w-64 bg-white border-r border-gray-200 flex flex-col justify-between">
  <div class="p-6">
    <div class="flex items-center space-x-3 mb-8">
      <div class="bg-indigo-600 text-white p-2 rounded-lg shadow-md">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"
          ></path>
        </svg>
      </div>
      <span class="text-xl font-bold text-gray-800 tracking-wide">To-Do</span>
    </div>
    <form
      [formGroup]="categoryForm"
      class="flex flex-col gap-2 mb-4 pb-4 border-b border-gray-300 px-1"
    >
      <div class="flex gap-1">
        <input
          type="color"
          formControlName="color"
          class="w-11 h-9 border border-indigo-500/20 rounded-md px-0.5 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/50 transition-all"
        />
        <input
          type="text"
          placeholder="＋ New category..."
          formControlName="name"
          class="w-full border border-indigo-500/20 rounded-md px-3 py-2 text-sm font-semibold text-gray-700 placeholder-gray-500 focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500/50 transition-all"
        />
      </div>
      @if (nameControl.invalid && (nameControl.touched || nameControl.dirty)) {
        <p class="text-sm text-red-500">
          @if (nameControl.hasError('required')) {
            Category name is required.
          }
        </p>
      }
      @if (isEditMode) {
        <div class="flex gap-2">
          <button
            (click)="onUpdateCategory()"
            class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow transition-colors disabled:bg-gray-300 disabled:shadow-none"
          >
            Update Category
          </button>
          <button
            (click)="cancelEdit()"
            type="button"
            title="Cancel"
            class="text-gray-400 hover:text-gray-600 bg-gray-50 px-2.5 rounded-md hover:bg-gray-100 transition-colors"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2.5"
                d="M6 18L18 6M6 6l12 12"
              ></path>
            </svg>
          </button>
        </div>
      } @else {
        <button
          (click)="onCreateCategory()"
          class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium shadow transition-colors disabled:bg-gray-300 disabled:shadow-none"
        >
          Add Category
        </button>
      }
    </form>
    <nav class="space-y-1">
      <span class="px-3 text-xs font-semibold text-gray-400 uppercase tracking-wider block mb-2"
        >Categories</span
      >

      <button
        (click)="selectCategory(undefined)"
        [class.bg-indigo-50]="selectedCategory() === undefined"
        [class.text-indigo-600]="selectedCategory() === undefined"
        class="w-full flex items-center justify-between px-3 py-2 text-sm font-medium rounded-lg text-gray-600 hover:bg-gray-50 transition-colors border-l-5 border-transparent"
      >
        <span class="flex items-center space-x-3">
          <span>All Tasks</span>
        </span>
      </button>

      @for (cat of categories(); track cat.id) {
        <button
          (click)="selectCategory(cat.id)"
          [class.bg-indigo-50]="selectedCategory() === cat.id"
          [class.text-indigo-600]="selectedCategory() === cat.id"
          class="group w-full flex items-center px-3 py-2 text-sm font-medium rounded-lg rounded-l-none text-gray-600 hover:bg-gray-50 transition-colors justify-between border-l-5"
          [style]="{ 'border-left-color': cat.color }"
        >
          <span class="flex items-center space-x-3 truncate">
            <span class="truncate">{{ cat.name }}</span>
          </span>
          <div class="flex gap-1">
            <button
              (click)="editCategory(cat.id)"
              title="Edit category"
              class="text-gray-400 hover:text-indigo-600 md:opacity-0 group-hover:opacity-100 p-1.5 rounded-xl hover:bg-indigo-50 transition-all duration-150"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"
                ></path>
              </svg>
            </button>
            <button
              (click)="onDeleteCategory(cat.id)"
              title="Delete category"
              class="text-gray-400 hover:text-red-500 md:opacity-0 group-hover:opacity-100 p-1.5 rounded-xl hover:bg-red-50 transition-all duration-150"
            >
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-16v1a3 3 0 003 3h10a3 3 0 003-3V3a3 3 0 00-3-3H9a3 3 0 00-3 3v1m5 4h6"
                ></path>
              </svg>
            </button>
          </div>
        </button>
      }
    </nav>
  </div>

  <div class="p-4 border-t border-gray-200 bg-gray-50 flex items-center justify-between">
    <button
      (click)="onLogout()"
      class="w-full flex justify-between items-center px-3 py-2 text-sm font-medium rounded-xl text-gray-400 hover:text-red-500 hover:bg-red-50 transition-colors text-left"
    >
      Log out

      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"
        ></path>
      </svg>
    </button>
  </div>
</aside>
